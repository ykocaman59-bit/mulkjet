<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mülkjet</title>
    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .eksper-nokta { position: absolute; width: 18px; height: 18px; border-radius: 50%; border: 2px solid white; cursor: pointer; transform: translate(-50%, -50%); transition: all 0.2s; }
        .durum-orjinal { background: #d1d5db; }
        .durum-boyali { background: #eab308; }
        .durum-lokal { background: #3b82f6; }
        .durum-degisen { background: #ef4444; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased text-sm">

    <!-- Üst Menü / Navbar -->
    <nav class="bg-white shadow-xs sticky top-0 z-50 border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <button type="button" id="logoBtn" class="text-xl font-black text-red-600 flex items-center gap-1 cursor-pointer tracking-tight">
                <span>🚀</span> MÜLK<span class="text-gray-900">JET</span>
            </button>
            <div class="flex items-center gap-4">
                <div id="authButonAlani" class="min-w-[120px] flex justify-end">
                    <!-- Giriş butonu buraya dinamik gelecek -->
                </div>
                <button type="button" id="yeniIlanEkleLink" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-xl font-bold transition shadow-xs cursor-pointer">
                    + İlan Ver
                </button>
            </div>
        </div>
    </nav>

    <!-- ANA SAYFA GÖRÜNÜMÜ -->
    <div id="anaSayfaGorunumu" class="block">
        <header class="bg-gradient-to-r from-red-600 to-orange-500 text-white py-8 px-4 text-center">
            <div class="max-w-4xl mx-auto">
                <h1 class="text-3xl font-black mb-2">Mülkjet ile Jet Hızıyla Keşfet</h1>
                <div class="bg-white p-1.5 rounded-xl shadow-md flex flex-col sm:flex-row gap-2 max-w-xl mx-auto mt-4">
                    <input type="text" id="hizliAraInput" placeholder="Kelime ile arayın..." class="flex-1 px-4 py-2 text-gray-800 focus:outline-none text-xs">
                    <button id="hizliAraBtn" class="bg-gray-900 text-white px-5 py-2 rounded-lg font-bold text-xs cursor-pointer">Ara</button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- SOL PANEL: Kategori Listesi ve Gelişmiş Filtreler -->
            <aside class="lg:col-span-1 space-y-4">
                <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-xs">
                    <h3 class="font-bold text-gray-900 mb-2 pb-1 border-b">📁 Kategoriler</h3>
                    <div id="dinamikKategoriAgaci" class="text-xs space-y-1 max-h-[400px] overflow-y-auto pr-1">
                        <!-- Kategoriler js ile yüklenecek -->
                    </div>
                </div>

                <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-xs space-y-3">
                    <h3 class="font-bold text-gray-900 pb-1 border-b">🎛️ Gelişmiş Filtrele</h3>
                    
                    <div>
                        <label class="block text-[11px] font-bold text-gray-500 mb-1">📍 Adres</label>
                        <select id="filtreIl" class="w-full p-2 border rounded-lg text-xs bg-white outline-none mb-1"><option value="">Tüm İller</option></select>
                        <select id="filtreIlce" class="w-full p-2 border rounded-lg text-xs bg-white outline-none"><option value="">Tüm İlçeler</option></select>
                    </div>

                    <div class="grid grid-cols-2 gap-1.5">
                        <div>
                            <label class="block text-[11px] font-bold text-gray-500">Min Fiyat</label>
                            <input type="number" id="filtreMinFiyat" class="w-full p-1.5 border rounded-lg text-xs">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-gray-500">Max Fiyat</label>
                            <input type="number" id="filtreMaxFiyat" class="w-full p-1.5 border rounded-lg text-xs">
                        </div>
                    </div>

                    <div id="ozelOtomobilFiltreleri" class="hidden border-t pt-2 space-y-2">
                        <div class="grid grid-cols-2 gap-1.5">
                            <div>
                                <label class="block text-[11px] font-bold text-gray-500">Min Yıl</label>
                                <input type="number" id="filtreMinYil" class="w-full p-1.5 border rounded-lg text-xs">
                            </div>
                            <div>
                                <label class="block text-[11px] font-bold text-gray-500">Max Yıl</label>
                                <input type="number" id="filtreMaxYil" class="w-full p-1.5 border rounded-lg text-xs">
                            </div>
                        </div>
                    </div>

                    <button id="filtreleriUygulaBtn" class="w-full bg-red-600 text-white font-bold py-2 rounded-xl text-xs hover:bg-red-700 cursor-pointer transition">Filtreleri Uygula</button>
                </div>
            </aside>

            <!-- SAĞ PANEL: İlanlar -->
            <section class="lg:col-span-3">
                <div class="flex justify-between items-center mb-3">
                    <h2 id="ilanListesiBaslik" class="text-md font-bold text-gray-900">🏠 Tüm İlanlar</h2>
                    <span id="ilanSayac" class="bg-red-100 text-red-600 text-xs px-2.5 py-0.5 rounded-full font-bold">0 İlan</span>
                </div>
                <div id="ilanBulunamadiAlani" class="hidden bg-white border p-12 rounded-xl text-center text-gray-500 font-bold">İlan bulunamamıştır.</div>
                <div id="ilanListesi" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
            </section>
        </main>
    </div>

    <!-- İLAN DETAY GÖRÜNÜMÜ -->
    <div id="ilanDetayGorunumu" class="hidden max-w-5xl mx-auto px-4 py-6">
        <button type="button" id="detaydanGeriDonBtn" class="text-xs font-bold text-gray-600 bg-white px-3 py-2 border rounded-lg mb-4 cursor-pointer">⬅️ Listeye Geri Dön</button>
        <div id="ilanDetayIcerikAlani"></div>
    </div>

    <!-- İLAN VERME FORMU -->
    <div id="ilanVerFormGorunumu" class="hidden max-w-4xl mx-auto px-4 py-6">
        <div id="formKilitliAlan" class="bg-white p-12 border rounded-xl text-center">
            <h2 class="text-lg font-bold mb-3">İlan Vermek İçin Giriş Yapın</h2>
            <button type="button" id="kilitliAlanGirisBtn" class="mx-auto bg-white border border-gray-300 text-gray-700 font-bold px-4 py-2 rounded-xl shadow-xs flex items-center justify-center gap-2 cursor-pointer hover:bg-gray-50">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-4 h-4" alt="Google"> Google ile Giriş Yap
            </button>
        </div>

        <div id="formAcikAlan" class="bg-white p-6 border rounded-xl hidden space-y-4">
            <h2 class="text-xl font-bold border-b pb-2">➕ Yeni İlan Oluştur</h2>
            <form id="anaMulkForm" class="space-y-4">
                
                <div class="grid grid-cols-1 md:grid-cols-4 gap-3 bg-gray-50 p-3 rounded-xl">
                    <div>
                        <label class="block text-xs font-bold text-gray-600">Ana Kategori</label>
                        <select id="formAnaKat" required class="w-full p-2 border rounded-lg bg-white text-xs"></select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600">Alt Kategori</label>
                        <select id="formAltKat" required class="w-full p-2 border rounded-lg bg-white text-xs"></select>
                    </div>
                    <div id="formMarkaBlok" class="hidden">
                        <label class="block text-xs font-bold text-gray-600">Marka</label>
                        <select id="formMarka" class="w-full p-2 border rounded-lg bg-white text-xs"></select>
                    </div>
                    <div id="formModelBlok" class="hidden">
                        <label class="block text-xs font-bold text-gray-600">Model</label>
                        <select id="formModel" class="w-full p-2 border rounded-lg bg-white text-xs"></select>
                    </div>
                </div>

                <!-- Otomobil Özellik Formu -->
                <div id="formOtomobilAlanlari" class="hidden bg-red-50/50 p-4 rounded-xl border border-red-100 space-y-3">
                    <h4 class="font-bold text-red-800 text-xs">🚗 Otomobil Teknik Özellikleri</h4>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <div>
                            <label class="block text-xs font-bold">Kilometre (KM)</label>
                            <input type="number" id="formKm" class="w-full p-2 border rounded-lg bg-white">
                        </div>
                        <div>
                            <label class="block text-xs font-bold">Model Yılı</label>
                            <input type="number" id="formYil" placeholder="2024" class="w-full p-2 border rounded-lg bg-white">
                        </div>
                        <div>
                            <label class="block text-xs font-bold">Vites</label>
                            <select id="formVites" class="w-full p-2 border rounded-lg bg-white"><option>Manuel</option><option>Otomatik</option></select>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold">İlan Başlığı</label>
                    <input type="text" id="formBaslik" required class="w-full p-2 border rounded-lg">
                </div>
                <div>
                    <label class="block text-xs font-bold">Açıklama</label>
                    <textarea id="formAciklama" required class="w-full p-2 border rounded-lg h-20"></textarea>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <div>
                        <label class="block text-xs font-bold">Fiyat (TL)</label>
                        <input type="number" id="formFiyat" required class="w-full p-2 border rounded-lg">
                    </div>
                    <div>
                        <label class="block text-xs font-bold">İl</label>
                        <select id="formIl" required class="w-full p-2 border rounded-lg bg-white text-xs"></select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold">İlçe</label>
                        <select id="formIlce" required class="w-full p-2 border rounded-lg bg-white text-xs"><option value="">Seçiniz</option></select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold">Görseller</label>
                    <input type="file" id="formGorseller" accept="image/*" multiple required class="w-full p-1.5 border rounded-lg text-xs bg-white">
                </div>

                <button type="submit" class="w-full bg-red-600 text-white font-bold py-3 rounded-xl hover:bg-red-700 cursor-pointer transition">İlanı Canlıya Al</button>
            </form>
        </div>
    </div>

    <footer class="bg-gray-950 text-gray-500 py-6 text-center mt-20 border-t border-gray-900 text-xs">
        © 2026 Mülkjet Platformu. Tüm hakları saklıdır.
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD7mIxqpIYuYSK2RCVl9p1gKMREpizyzIQ",
            authDomain: "mulkjet-app.firebaseapp.com",
            projectId: "mulkjet-app",
            storageBucket: "mulkjet-app.firebasestorage.app",
            messagingSenderId: "115312263927",
            appId: "1:115312263927:web:ec07adacc4b0ec94cb49f2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        
        provider.setCustomParameters({ 
            prompt: 'select_account',
            auth_type: 'rerequest'
        });

        let globalIlanlar = [];
        let seciliKategoriPath = ["hepsi"]; 
        let aramaKelimesi = "";

        const sehirData = { "İstanbul": ["Sultanbeyli", "Kadıköy", "Pendik"], "Ankara": ["Çankaya"], "İzmir": ["Konak"] };

        // SAHİBİNDEN.COM PARAMETRELERİNE UYGUN 96 ADET ARABA MARKASI (TAM LİSTE)
        const tumArabaMarkalari = [
            "Alfa Romeo", "Aston Martin", "Audi", "Bentley", "BMW", "Bugatti", "Buick", "Cadillac", "Caterham", "Chery", 
            "Chevrolet", "Chrysler", "Citroen", "Cupra", "Dacia", "Daewoo", "Daihatsu", "Dodge", "DS Automobiles", "Ferrari", 
            "Fiat", "Fisker", "Ford", "Geely", "GMC", "Honda", "Hummer", "Hyundai", "Infiniti", "Isuzu", "Jaguar", 
            "Jeep", "Kia", "Koenigsegg", "Lada", "Lamborghini", "Lancia", "Land Rover", "Lexus", "Lincoln", "Lotus", 
            "Maruti", "Maserati", "Maybach", "Mazda", "McLaren", "Mercedes-Benz", "MG", "Mini", "Mitsubishi", "Morgan", 
            "Morris", "Moskvich", "Nissan", "Noble", "Oldsmobile", "Opel", "Packard", "Pagani", "Peugeot", "Plymouth", 
            "Pontiac", "Porsche", "Proton", "Ram", "Reliant", "Renault", "Rolls-Royce", "Rover", "Saab", "Saleen", 
            "Saturn", "Scion", "Seat", "Skoda", "Smart", "Spyker", "SsangYong", "Subaru", "Suzuki", "Tata", "Tesla", 
            "Tofaş", "Togg", "Toyota", "Triumph", "TVR", "Vauxhall", "Vector", "Venturi", "Volkswagen", "Volvo", 
            "Wiesmann", "Willys", "Wolseley", "Zastava"
        ];

        const arabalarSemasi = {};
        tumArabaMarkalari.forEach(marka => {
            arabalarSemasi[marka] = { "Genel Model": ["Standart"] };
        });

        const kategoriSemasi = {
            "Emlak": { "Satılık Konut": {}, "Kiralık Daire": {}, "Arsa": {}, "Devren Satılık İş Yeri": {} },
            "Vasıta": { "Otomobil": arabalarSemasi, "Mini Panelvan": {}, "Motosiklet": {}, "Moped (Elektrikli)": {} }
        };

        const ekranGoster = (ekran) => {
            document.getElementById('anaSayfaGorunumu').style.display = 'none';
            document.getElementById('ilanDetayGorunumu').style.display = 'none';
            document.getElementById('ilanVerFormGorunumu').style.display = 'none';
            
            if(ekran === 'ana') document.getElementById('anaSayfaGorunumu').style.display = 'block';
            if(ekran === 'detay') document.getElementById('ilanDetayGorunumu').style.display = 'block';
            if(ekran === 'form') document.getElementById('ilanVerFormGorunumu').style.display = 'block';
        };

        const googleGirisAksiyon = async () => {
            try {
                await signOut(auth);
                const result = await signInWithPopup(auth, provider);
                if(result.user) {
                    oturumArayuzunuGuncelle();
                    ekranGoster('ana');
                }
            } catch (err) { console.error("Giriş hatası:", err); }
        };

        const oturumArayuzunuGuncelle = () => {
            const alan = document.getElementById('authButonAlani');
            const u = auth.currentUser;
            if(u) {
                document.getElementById('formKilitliAlan').style.display = 'none';
                document.getElementById('formAcikAlan').style.display = 'block';
                alan.innerHTML = `<button id="navCikisBtn" class="bg-gray-200 hover:bg-gray-300 text-gray-800 text-xs font-bold px-3 py-1.5 rounded-xl cursor-pointer">Çıkış Yap</button>`;
                document.getElementById('navCikisBtn').onclick = async () => {
                    await signOut(auth);
                    oturumArayuzunuGuncelle();
                    ekranGoster('ana');
                };
            } else {
                document.getElementById('formKilitliAlan').style.display = 'block';
                document.getElementById('formAcikAlan').style.display = 'none';
                alan.innerHTML = `<button id="navGirisBtn" class="bg-red-600 hover:bg-red-700 text-white text-xs font-bold px-3 py-1.5 rounded-xl cursor-pointer">Giriş Yap</button>`;
                document.getElementById('navGirisBtn').onclick = googleGirisAksiyon;
            }
        };

        const kategoriAgaciniOlustur = () => {
            const alan = document.getElementById('dinamikKategoriAgaci');
            if(!alan) return;
            alan.innerHTML = "";

            let tumBtn = document.createElement('div');
            tumBtn.className = `p-1.5 rounded font-bold cursor-pointer ${seciliKategoriPath[0]==='hepsi'?'bg-red-600 text-white':''}`;
            tumBtn.innerHTML = `Tüm İlanlar (${globalIlanlar.length})`;
            tumBtn.onclick = () => { seciliKategoriPath = ['hepsi']; filtreAksiyonlariniYonet(); };
            alan.appendChild(tumBtn);

            Object.keys(kategoriSemasi).forEach(ana => {
                let divAna = document.createElement('div');
                divAna.className = `pl-1 mt-2 font-bold flex justify-between cursor-pointer ${seciliKategoriPath[0]===ana?'text-red-600':''}`;
                divAna.innerHTML = `<span>${ana==='Emlak'?'🏠':'🚗'} ${ana}</span>`;
                divAna.onclick = () => { seciliKategoriPath = [ana]; filtreAksiyonlariniYonet(); };
                alan.appendChild(divAna);

                if(seciliKategoriPath[0] === ana) {
                    Object.keys(kategoriSemasi[ana]).forEach(alt => {
                        let divAlt = document.createElement('div');
                        divAlt.className = `pl-3 py-0.5 flex justify-between cursor-pointer ${seciliKategoriPath[1]===alt?'text-red-600 font-bold':''}`;
                        divAlt.innerHTML = `<span>• ${alt}</span>`;
                        divAlt.onclick = (e) => { e.stopPropagation(); seciliKategoriPath = [ana, alt]; filtreAksiyonlariniYonet(); };
                        alan.appendChild(divAlt);

                        if(seciliKategoriPath[1] === alt && alt === 'Otomobil') {
                            let mKutu = document.createElement('div');
                            mKutu.className = "max-h-[150px] overflow-y-auto pl-4 border-l space-y-0.5 mt-1 no-scrollbar";
                            tumArabaMarkalari.forEach(marka => {
                                let divM = document.createElement('div');
                                divM.className = `text-[11px] cursor-pointer ${seciliKategoriPath[2]===marka?'text-orange-500 font-bold':''}`;
                                divM.innerHTML = `➡️ ${marka}`;
                                divM.onclick = (e) => { e.stopPropagation(); seciliKategoriPath = [ana, alt, marka]; filtreAksiyonlariniYonet(); };
                                mKutu.appendChild(divM);
                            });
                            alan.appendChild(mKutu);
                        }
                    });
                }
            });
        };

        const filtreAksiyonlariniYonet = () => {
            const altK = seciliKategoriPath[1];
            const otomobilFiltre = document.getElementById('ozelOtomobilFiltreleri');
            if(otomobilFiltre) {
                if(altK === 'Otomobil') otomobilFiltre.classList.remove('hidden');
                else otomobilFiltre.classList.add('hidden');
            }
            kategoriAgaciniOlustur();
            ilanlariFiltreleVeListele();
        };

        const ilanlariFiltreleVeListele = () => {
            const kutu = document.getElementById('ilanListesi');
            if(!kutu) return;
            let sonuclar = [...globalIlanlar];

            const p = seciliKategoriPath;
            if(p[0] !== 'hepsi') {
                sonuclar = sonuclar.filter(i => i.anaKategori === p[0]);
                if(p[1]) sonuclar = sonuclar.filter(i => i.altKategori === p[1]);
                if(p[2]) sonuclar = sonuclar.filter(i => i.marka === p[2]);
            }

            document.getElementById('ilanSayac').textContent = `${sonuclar.length} İlan`;
            kutu.innerHTML = "";

            if(sonuclar.length === 0) {
                document.getElementById('ilanBulunamadiAlani').classList.remove('hidden');
                return;
            }
            document.getElementById('ilanBulunamadiAlani').classList.add('hidden');

            sonuclar.forEach(i => {
                let resim = (i.gorseller && i.gorseller.length > 0) ? i.gorseller[0] : "https://via.placeholder.com/400x250";
                let div = document.createElement('div');
                div.className = "bg-white border border-gray-200 rounded-xl overflow-hidden hover:shadow-md cursor-pointer transition flex flex-col";
                div.onclick = () => ilanDetayAc(i);
                
                div.innerHTML = `
                    <div class="h-40 bg-gray-100"><img src="${resim}" class="w-full h-full object-cover"></div>
                    <div class="p-3 flex-1 flex flex-col justify-between">
                        <div>
                            <span class="text-[10px] bg-red-50 text-red-600 px-2 py-0.5 rounded-full font-bold mb-1 inline-block">${i.altKategori}</span>
                            <h4 class="font-bold text-gray-900 line-clamp-2">${i.baslik}</h4>
                            <p class="text-[11px] text-gray-400 mt-1">📍 ${i.il} / ${i.ilce}</p>
                            ${i.marka ? `<p class="text-[10px] text-gray-500 mt-1">🚗 ${i.marka} ${i.model}</p>` : ''}
                        </div>
                        <div class="text-right mt-3 font-black text-red-600 text-md border-t pt-2">${Number(i.fiyat).toLocaleString('tr-TR')} TL</div>
                    </div>
                `;
                kutu.appendChild(div);
            });
        };

        const ilanDetayAc = (i) => {
            ekranGoster('detay');
            let gHtml = "";
            if(i.gorseller) i.gorseller.forEach(g => gHtml += `<img src="${g}" class="max-h-64 object-contain bg-black rounded-lg">`);

            document.getElementById('ilanDetayIcerikAlani').innerHTML = `
                <div class="bg-white border rounded-xl p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 space-y-4">
                        <div class="flex gap-2 overflow-x-auto p-2 bg-gray-900 rounded-xl no-scrollbar">${gHtml}</div>
                        <div class="border-t pt-3">
                            <h3 class="font-bold text-gray-900">Açıklama</h3>
                            <p class="text-xs text-gray-600 mt-2 whitespace-pre-line">${i.aciklama}</p>
                        </div>
                    </div>
                    <div class="space-y-4 bg-gray-50/50 p-4 border rounded-xl">
                        <h2 class="text-lg font-bold">${i.baslik}</h2>
                        <div class="text-xl font-black text-red-600">${Number(i.fiyat).toLocaleString('tr-TR')} TL</div>
                        <div class="text-xs space-y-2 border-t border-b py-2">
                            <div><strong>Kategori:</strong> ${i.anaKategori} / ${i.altKategori}</div>
                            ${i.marka ? `<div><strong>Marka / Model:</strong> ${i.marka} / ${i.model}</div>` : ''}
                            <div><strong>Konum:</strong> ${i.il} / ${i.ilce}</div>
                        </div>
                    </div>
                </div>
            `;
        };

        const formKademeleriDoldur = () => {
            const ana = document.getElementById('formAnaKat'); ana.innerHTML = "";
            Object.keys(kategoriSemasi).forEach(k => ana.innerHTML += `<option value="${k}">${k}</option>`);
            formAltKatDegisti();
        };

        const formAltKatDegisti = () => {
            const a = document.getElementById('formAnaKat').value;
            const alt = document.getElementById('formAltKat'); alt.innerHTML = "";
            Object.keys(kategoriSemasi[a]).forEach(al => alt.innerHTML += `<option value="${al}">${al}</option>`);
            formOzellikAlanlariniYonet();
        };

        const formOzellikAlanlariniYonet = () => {
            const al = document.getElementById('formAltKat').value;
            
            document.getElementById('formOtomobilAlanlari').classList.add('hidden');
            document.getElementById('formMarkaBlok').classList.add('hidden');
            document.getElementById('formModelBlok').classList.add('hidden');

            if(al === 'Otomobil') {
                document.getElementById('formOtomobilAlanlari').classList.remove('hidden');
                document.getElementById('formMarkaBlok').classList.remove('hidden');
                document.getElementById('formModelBlok').classList.remove('hidden');
                
                const mSel = document.getElementById('formMarka'); mSel.innerHTML = "";
                tumArabaMarkalari.forEach(m => mSel.innerHTML += `<option value="${m}">${m}</option>`);
                
                const moSel = document.getElementById('formModel');
                moSel.innerHTML = '<option value="Genel Model">Genel Model</option>';
            }
        };

        document.getElementById('anaMulkForm').onsubmit = async function(e) {
            e.preventDefault();
            let resimlerListesi = [];
            let gorselGirdiler = document.getElementById('formGorseller').files;

            const veriPaketleVeGonder = async () => {
                await addDoc(collection(db, "ilanlar"), {
                    anaKategori: document.getElementById('formAnaKat').value,
                    altKategori: document.getElementById('formAltKat').value,
                    marka: document.getElementById('formMarka').value || "",
                    model: document.getElementById('formModel').value || "",
                    baslik: document.getElementById('formBaslik').value,
                    aciklama: document.getElementById('formAciklama').value,
                    fiyat: document.getElementById('formFiyat').value,
                    il: document.getElementById('formIl').value,
                    ilce: document.getElementById('formIlce').value,
                    gorseller: resimlerListesi,
                    tarih: new Date().toISOString()
                });
                alert("İlanınız Canlıya Alındı!");
                document.getElementById('anaMulkForm').reset();
                ekranGoster('ana');
                ilanlariCek();
            };

            if(gorselGirdiler.length === 0) { await veriPaketleVeGonder(); } else {
                let sayac = 0;
                for(let idx=0; idx<gorselGirdiler.length; idx++) {
                    const reader = new FileReader();
                    reader.onloadend = () => { resimlerListesi.push(reader.result); sayac++; if(sayac === gorselGirdiler.length) veriPaketleVeGonder(); };
                    reader.readAsDataURL(gorselGirdiler[idx]);
                }
            }
        };

        const ilanlariCek = async () => {
            try {
                const snap = await getDocs(collection(db, "ilanlar"));
                globalIlanlar = [];
                snap.forEach(d => globalIlanlar.push({ id: d.id, ...d.data() }));
            } catch(e) { console.log("Veri çekilemedi, local modda çalışılıyor."); }
            filtreAksiyonlariniYonet();
        };

        // Event Listener Bağlantıları
        document.getElementById('logoBtn').onclick = () => { seciliKategoriPath = ['hepsi']; filtreAksiyonlariniYonet(); ekranGoster('ana'); };
        document.getElementById('detaydanGeriDonBtn').onclick = () => ekranGoster('ana');
        document.getElementById('yeniIlanEkleLink').onclick = () => { ekranGoster('form'); formKademeleriDoldur(); };
        document.getElementById('kilitliAlanGirisBtn').onclick = googleGirisAksiyon;
        document.getElementById('hizliAraBtn').onclick = () => { aramaKelimesi = document.getElementById('hizliAraInput').value; ilanlariFiltreleVeListele(); };
        document.getElementById('filtreleriUygulaBtn').onclick = ilanlariFiltreleVeListele;
        document.getElementById('formAnaKat').onchange = formAltKatDegisti;
        document.getElementById('formAltKat').onchange = formOzellikAlanlariniYonet;

        // Şehir ve İlçe Yapılandırması
        const fIl = document.getElementById('filtreIl'); const formIl = document.getElementById('formIl');
        Object.keys(sehirData).forEach(sehir => {
            fIl.innerHTML += `<option value="${sehir}">${sehir}</option>`;
            formIl.innerHTML += `<option value="${sehir}">${sehir}</option>`;
        });
        document.getElementById('filtreIl').onchange = (e) => {
            const ilce = document.getElementById('filtreIlce'); ilce.innerHTML = '<option value="">Tüm İlçeler</option>';
            if(sehirData[e.target.value]) sehirData[e.target.value].forEach(i => ilce.innerHTML += `<option value="${i}">${i}</option>`);
        };
        document.getElementById('formIl').onchange = (e) => {
            const ilce = document.getElementById('formIlce'); ilce.innerHTML = '<option value="">Seçiniz</option>';
            if(sehirData[e.target.value]) sehirData[e.target.value].forEach(i => ilce.innerHTML += `<option value="${i}">${i}</option>`);
        };

        // Firebase Başlangıç Kontrolü
        auth.onAuthStateChanged(user => {
            oturumArayuzunuGuncelle();
            ilanlariCek();
        });
    </script>
</body>
</html>
