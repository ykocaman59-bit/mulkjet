<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mülkjet Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; }
        .part-orijinal { background-color: #22c55e; color: white; }
        .part-boyali { background-color: #eab308; color: black; }
        .part-degisen { background-color: #ef4444; color: white; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- Navbar -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <button type="button" id="logoBtn" class="text-2xl font-black text-red-600 tracking-tight cursor-pointer">
                🚀 MÜLK<span class="text-gray-900">JET</span>
            </button>
            <div class="flex items-center gap-4">
                <div id="authButonAlani"></div>
                <button type="button" id="yeniIlanEkleLink" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-medium text-sm transition cursor-pointer">
                    + İlan Ver
                </button>
            </div>
        </div>
    </nav>

    <!-- Ana Sayfa -->
    <div id="anaSayfaGorunumu" class="block">
        <header class="bg-gradient-to-r from-red-600 to-orange-500 text-white py-12 px-4 text-center">
            <div class="max-w-4xl mx-auto">
                <h1 class="text-3xl font-extrabold mb-4">Mülkjet Gelişmiş Filtreli İlan Dünyası</h1>
                <div class="bg-white p-2 rounded-xl shadow-lg flex flex-col md:flex-row gap-2 max-w-2xl mx-auto">
                    <input type="text" id="hizliAraInput" placeholder="Kelimelerle arayın..." class="flex-1 px-4 py-3 text-gray-800 focus:outline-none rounded-lg text-sm">
                    <button id="hizliAraBtn" class="bg-gray-900 text-white px-6 py-3 rounded-lg font-medium text-sm cursor-pointer">Ara</button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-4 gap-8">
            <!-- Sol Panel: Kategoriler ve Derin Filtreleme -->
            <aside class="lg:col-span-1 space-y-6">
                <div class="bg-white p-4 rounded-xl shadow-xs border border-gray-100">
                    <h3 class="font-bold text-gray-900 text-sm border-b pb-2 mb-3">📁 Kategoriler</h3>
                    <div id="dinamikKategoriAgaci" class="text-xs space-y-2 text-gray-600"></div>
                </div>

                <div class="bg-white p-4 rounded-xl shadow-xs border border-gray-100 space-y-4">
                    <h3 class="font-bold text-gray-900 text-sm border-b pb-2">🎛️ Derinlemesine Filtrele</h3>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[10px] font-semibold mb-1">Min Model Yılı</label>
                            <input type="number" id="filtreMinYil" placeholder="Örn: 2010" class="w-full p-1.5 border rounded-md text-xs">
                        </div>
                        <div>
                            <label class="block text-[10px] font-semibold mb-1">Max Model Yılı</label>
                            <input type="number" id="filtreMaxYil" placeholder="Örn: 2026" class="w-full p-1.5 border rounded-md text-xs">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[10px] font-semibold mb-1">Min KM</label>
                            <input type="number" id="filtreMinKm" class="w-full p-1.5 border rounded-md text-xs">
                        </div>
                        <div>
                            <label class="block text-[10px] font-semibold mb-1">Max KM</label>
                            <input type="number" id="filtreMaxKm" class="w-full p-1.5 border rounded-md text-xs">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-semibold mb-1">Hasar Durumu</label>
                        <select id="filtreHasar" class="w-full p-2 border rounded-md text-xs bg-white">
                            <option value="">Tümü</option>
                            <option value="Hasarsız">Hasarsız / Orijinal</option>
                            <option value="Hasarlı">Hasar Kayıtlı (Tramerli)</option>
                            <option value="Ağır Hasarlı">Ağır Hasar Kayıtlı</option>
                        </select>
                    </div>
                    <button id="filtreleriUygulaBtn" class="w-full bg-red-600 text-white font-bold py-2 rounded-md text-xs hover:bg-red-700 transition cursor-pointer">Filtreleri Uygula</button>
                </div>
            </aside>

            <!-- Sağ Panel: İlanlar -->
            <section class="lg:col-span-3">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-gray-900">🏠 İlanlar</h2>
                    <span id="ilanSayac" class="bg-red-100 text-red-600 text-xs px-2.5 py-1 rounded-full font-bold">0 İlan</span>
                </div>
                <div id="ilanListesi" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
            </section>
        </main>
    </div>

    <!-- İlan Detay Görünümü -->
    <div id="ilanDetayGorunumu" class="hidden max-w-6xl mx-auto px-4 py-8">
        <button type="button" id="detaydanGeriDonBtn" class="text-sm font-bold text-gray-600 hover:text-red-600 mb-6 bg-white px-4 py-2 rounded-lg border cursor-pointer">⬅️ Listeye Dön</button>
        <div id="ilanDetayIcerikAlani"></div>
    </div>

    <!-- İlan Verme Ekranı (Auth Korumalı) -->
    <div id="ilanVerFormGorunumu" class="hidden max-w-4xl mx-auto px-4 py-8">
        <!-- Auth Giriş Paneli (Giriş Yapılmadıysa Görünür) -->
        <div id="formKilitliAlan" class="bg-white p-6 rounded-2xl shadow-md border max-w-md mx-auto space-y-4 text-center">
            <h2 class="text-lg font-bold text-gray-900">Devam Etmek İçin Giriş Yapın</h2>
            <!-- Çöken Pop-up Yerine Doğrudan Tetiklenen Buton -->
            <button type="button" id="kilitliAlanGirisBtn" class="w-full bg-red-600 hover:bg-red-700 text-white font-medium py-2.5 rounded-xl transition flex items-center justify-center gap-2 cursor-pointer text-xs shadow-xs">
                Google Hesabı ile Giriş Yap (Gmail)
            </button>
        </div>

        <!-- İlan Formu (Giriş Yapıldıysa Görünür) -->
        <div id="formAcikAlan" class="bg-white p-6 rounded-2xl shadow-md border hidden">
            <h2 class="text-2xl font-black mb-6 border-b pb-3">➕ Mülkjet Yeni İlan Oluştur</h2>
            <form id="emlakForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 bg-gray-50 p-4 rounded-xl">
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">Ana Kategori</label>
                        <select id="formAnaKategori" class="w-full px-3 py-2 border rounded-lg text-sm bg-white">
                            <option value="Vasıta">🚗 Vasıta</option>
                            <option value="Emlak">🏠 Emlak</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">Kategori Tipi</label>
                        <select id="formAltKategori" class="w-full px-3 py-2 border rounded-lg text-sm bg-white"></select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">Marka / Model</label>
                        <select id="formMarkaModel" class="w-full px-3 py-2 border rounded-lg text-sm bg-white"></select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="ilanBaslik" required placeholder="İlan Başlığı" class="w-full px-3 py-2 border rounded-lg text-sm">
                    <input type="number" id="ilanFiyat" required placeholder="Fiyat (TL)" class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>

                <textarea id="ilanAciklama" required placeholder="İlan Açıklaması..." class="w-full px-3 py-2 border rounded-lg text-sm h-24"></textarea>
                
                <div class="bg-gray-50 p-4 rounded-xl grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="number" id="ilanYil" placeholder="Model Yılı" class="w-full px-3 py-2 border rounded-lg text-sm">
                    <input type="number" id="ilanKm" placeholder="Kilometre" class="w-full px-3 py-2 border rounded-lg text-sm">
                    <select id="ilanHasarDurumu" class="w-full px-3 py-2 border rounded-lg text-sm bg-white">
                        <option value="Hasarsız">Hasarsız / Orijinal</option>
                        <option value="Hasarlı">Hasar Kayıtlı</option>
                        <option value="Ağır Hasarlı">Ağır Hasar Kayıtlı</option>
                    </select>
                </div>

                <!-- 12 Parçalı Ekspertiz Şeması -->
                <div id="formEkspertizSemasiAlani" class="bg-gray-50 p-4 rounded-xl">
                    <h4 class="text-xs font-bold text-gray-700 uppercase mb-2">🚗 Ekspertiz Şeması (Dokun Değiştir)</h4>
                    <div id="formEkspertizGrid" class="grid grid-cols-2 sm:grid-cols-4 gap-2 text-center text-xs font-semibold"></div>
                </div>

                <div class="bg-gray-50 p-4 rounded-xl grid grid-cols-2 gap-2">
                    <input type="text" id="ilanIl" required placeholder="İl (Örn: İstanbul)" class="w-full px-3 py-2 border rounded-lg text-sm">
                    <input type="text" id="ilanIlce" required placeholder="İlçe" class="w-full px-3 py-2 border rounded-lg text-sm">
                    <input type="text" id="ilanMahalle" required placeholder="Mahalle" class="w-full px-3 py-2 border rounded-lg text-sm col-span-2">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <input type="tel" id="ilanTelefon" required placeholder="İletişim Telefonu" class="w-full px-3 py-2 border rounded-lg text-sm">
                    <input type="file" id="ilanDosyalar" accept="image/*" multiple class="w-full px-2 py-1.5 border rounded-lg text-xs bg-white">
                </div>

                <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-lg text-sm cursor-pointer shadow-md">İlanı Yayınla</button>
            </form>
        </div>
    </div>

    <!-- Firebase Kodu ve Mantıksal Çözüm -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD7mIxqpIYuYSK2RCVl9p1gKMREpizyzIQ",
            authDomain: "mulkjet-app.firebaseapp.com",
            projectId: "mulkjet-app",
            storageBucket: "mulkjet-app.firebasestorage.app",
            messagingSenderId: "115312263927",
            appId: "1:115312263927:web:ec07adacc4b0ec94cb49f2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let globalIlanlar = [];
        let aktifKategori = "Tümü";
        const arabaParcalari = ["Ön Tampon", "Kaput", "Tavan", "Bagaj", "Sağ Ön Çamurluk", "Sağ Ön Kapı", "Sağ Arka Kapı", "Sağ Arka Çamurluk", "Sol Ön Çamurluk", "Sol Ön Kapı", "Sol Arka Kapı", "Sol Arka Çamurluk"];
        let ekspertizDurumu = {};

        const vasitaAgaci = {
            "Otomobil": {
                "Fiat": ["Egea", "Linea", "Punto", "Panda"],
                "Renault": ["Clio", "Megane", "Symbol", "Fluence"],
                "Volkswagen": ["Golf", "Passat", "Polo", "Jetta"],
                "BMW": ["3 Serisi", "5 Serisi", "1 Serisi"],
                "Mercedes": ["C Serisi", "E Serisi", "A Serisi"],
                "Audi": ["A3", "A4", "A6"],
                "Hyundai": ["i20", "Accent", "Elantra"],
                "Toyota": ["Corolla", "Yaris"]
            },
            "Motosiklet": {
                "Skyjet": ["Twister", "Nitro"],
                "Honda": ["PCX", "Forza", "Dio"],
                "Yamaha": ["NMAX", "XMAX"]
            }
        };

        const ekranDegistir = (ekran) => {
            document.getElementById('anaSayfaGorunumu').className = ekran === 'ana' ? 'block' : 'hidden';
            document.getElementById('ilanDetayGorunumu').className = ekran === 'detay' ? 'block' : 'hidden';
            document.getElementById('ilanVerFormGorunumu').className = ekran === 'form' ? 'block' : 'hidden';
        };

        // Google Giriş Düzeltmesi (Popup kullanarak ekranın kapanma/donma sorununu çözer)
        const googleIleGirisYap = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                oturumGuncelle(result.user);
            } catch (err) {
                alert("Gmail ekranı açılamadı veya iptal edildi: " + err.message);
            }
        };

        const oturumGuncelle = (user) => {
            const btnAlani = document.getElementById('authButonAlani');
            if (user) {
                document.getElementById('formKilitliAlan').classList.add('hidden');
                document.getElementById('formAcikAlan').classList.remove('hidden');
                btnAlani.innerHTML = `<button id="cikisBtn" class="text-xs bg-gray-200 px-3 py-1.5 rounded-lg font-bold">${user.email.split('@')[0]} (Çıkış)</button>`;
                document.getElementById('cikisBtn').onclick = () => { signOut(auth); oturumGuncelle(null); };
            } else {
                document.getElementById('formKilitliAlan').classList.remove('hidden');
                document.getElementById('formAcikAlan').classList.add('hidden');
                btnAlani.innerHTML = `<button id="girisBtn" class="border border-red-500 text-red-600 px-3 py-1.5 rounded-lg text-xs font-bold">Giriş Yap</button>`;
                document.getElementById('girisBtn').onclick = googleIleGirisYap;
            }
        };

        // Kategori Ağacını Düzenli Ve Çalışır Hale Getirme
        const kategorileriBas = () => {
            const alan = document.getElementById('dinamikKategoriAgaci');
            alan.innerHTML = `<button class="w-full text-left font-bold text-red-600 mb-1" id="cat-tumu">Tüm İlanlar</button>`;
            
            Object.keys(vasitaAgaci).forEach(k => {
                let div = document.createElement('div');
                div.className = "pl-2 font-semibold text-gray-900 mt-2";
                div.innerText = "🚗 " + k;
                alan.appendChild(div);

                Object.keys(vasitaAgaci[k]).forEach(m => {
                    let btn = document.createElement('button');
                    btn.className = "block pl-4 text-left text-gray-600 hover:text-red-500 py-0.5";
                    btn.innerText = "• " + m;
                    btn.onclick = () => { aktifKategori = m; ilanlariFiltrele(); };
                    alan.appendChild(btn);
                });
            });
            
            let emlakDiv = document.createElement('div');
            emlakDiv.className = "pl-2 font-semibold text-gray-900 mt-2 cursor-pointer";
            emlakDiv.innerText = "🏠 Emlak";
            emlakDiv.onclick = () => { aktifKategori = "Emlak"; ilanlariFiltrele(); };
            alan.appendChild(emlakDiv);

            document.getElementById('cat-tumu').onclick = () => { aktifKategori = "Tümü"; ilanlariFiltrele(); };
        };

        // Ekspertiz Şemasını Çizme
        const ekspertizSemaCiz = () => {
            const grid = document.getElementById('formEkspertizGrid');
            grid.innerHTML = '';
            arabaParcalari.forEach(p => {
                ekspertizDurumu[p] = "Orijinal";
                const d = document.createElement('div');
                d.className = "p-2 rounded border cursor-pointer part-orijinal transition";
                d.innerText = p + ": Orijinal";
                d.onclick = () => {
                    if(ekspertizDurumu[p] === "Orijinal") { ekspertizDurumu[p] = "Boyalı"; d.className = "p-2 rounded border cursor-pointer part-boyali"; }
                    else if(ekspertizDurumu[p] === "Boyalı") { ekspertizDurumu[p] = "Değişen"; d.className = "p-2 rounded border cursor-pointer part-degisen"; }
                    else { ekspertizDurumu[p] = "Orijinal"; d.className = "p-2 rounded border cursor-pointer part-orijinal"; }
                    d.innerText = p + ": " + ekspertizDurumu[p];
                };
                grid.appendChild(d);
            });
        };

        // İlanları Filtreleme Filtre Motoru
        const ilanlariFiltrele = () => {
            let filtrelenmis = [...globalIlanlar];
            
            if(aktifKategori !== "Tümü") {
                filtrelenmis = filtrelenmis.filter(i => i.marka === aktifKategori || i.anaKategori === aktifKategori);
            }

            const minY = document.getElementById('filtreMinYil').value;
            const maxY = document.getElementById('filtreMaxYil').value;
            const minK = document.getElementById('filtreMinKm').value;
            const maxK = document.getElementById('filtreMaxKm').value;
            const hasar = document.getElementById('filtreHasar').value;
            const arama = document.getElementById('hizliAraInput').value.toLowerCase();

            if(minY) filtrelenmis = filtrelenmis.filter(i => Number(i.yil) >= Number(minY));
            if(maxY) filtrelenmis = filtrelenmis.filter(i => Number(i.yil) <= Number(maxY));
            if(minK) filtrelenmis = filtrelenmis.filter(i => Number(i.km) >= Number(minK));
            if(maxK) filtrelenmis = filtrelenmis.filter(i => Number(i.km) <= Number(maxK));
            if(hasar) filtrelenmis = filtrelenmis.filter(i => i.hasarDurumu === hasar);
            if(arama) filtrelenmis = filtrelenmis.filter(i => i.baslik.toLowerCase().includes(arama) || i.aciklama.toLowerCase().includes(arama));

            document.getElementById('ilanSayac').innerText = filtrelenmis.length + " İlan";
            const liste = document.getElementById('ilanListesi');
            liste.innerHTML = '';

            filtrelenmis.forEach(ilan => {
                const img = (ilan.gorseller && ilan.gorseller.length > 0) ? ilan.gorseller[0] : "https://via.placeholder.com/400x250";
                const div = document.createElement('div');
                div.className = "bg-white rounded-xl border overflow-hidden shadow-xs hover:shadow-md cursor-pointer";
                div.onclick = () => detayAc(ilan);
                div.innerHTML = `
                    <div class="h-40 bg-gray-200"><img src="${img}" class="w-full h-full object-cover"></div>
                    <div class="p-3">
                        <h3 class="font-bold text-sm text-gray-900 line-clamp-1">${ilan.baslik}</h3>
                        <p class="text-xs text-gray-400 mt-1">📍 ${ilan.il} / ${ilan.ilce}</p>
                        <div class="flex justify-between items-center mt-3 pt-2 border-t">
                            <span class="text-sm font-black text-red-600">${Number(ilan.fiyat).toLocaleString('tr-TR')} TL</span>
                            <span class="text-[10px] bg-gray-100 px-2 py-0.5 rounded">${ilan.yil || 'Emlak'}</span>
                        </div>
                    </div>
                `;
                liste.appendChild(div);
            });
        };

        const detayAc = (ilan) => {
            ekranDegistir('detay');
            const wpMetin = encodeURIComponent(`Mülkjet İlanı: ${ilan.baslik}\nFiyat: ${ilan.fiyat} TL\nKonum: ${ilan.il}/${ilan.ilce}`);
            
            let ekspertizHtml = '';
            if(ilan.ekspertizVerisi) {
                ekspertizHtml = `<div class="mt-4 border-t pt-4"><h4 class="text-xs font-bold mb-2">🚗 Ekspertiz Şeması Durumu</h4><div class="grid grid-cols-2 sm:grid-cols-4 gap-2 text-[10px] text-center font-bold">`;
                Object.keys(ilan.ekspertizVerisi).forEach(p => {
                    let c = "part-orijinal";
                    if(ilan.ekspertizVerisi[p] === "Boyalı") c = "part-boyali";
                    if(ilan.ekspertizVerisi[p] === "Değişen") c = "part-degisen";
                    ekspertizHtml += `<div class="p-1 rounded ${c}">${p}: ${ilan.ekspertizVerisi[p]}</div>`;
                });
                ekspertizHtml += `</div></div>`;
            }

            document.getElementById('ilanDetayIcerikAlani').innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 bg-white p-6 rounded-2xl border">
                    <div class="lg:col-span-2 space-y-4">
                        <img src="${ilan.gorseller[0] || 'https://via.placeholder.com/600x400'}" class="w-full max-h-90 object-cover bg-gray-100 rounded-xl">
                        <p class="text-sm text-gray-700 pt-2"><strong>Açıklama:</strong> ${ilan.aciklama}</p>
                        ${ekspertizHtml}
                    </div>
                    <div class="space-y-4">
                        <h1 class="text-xl font-bold">${ilan.baslik}</h1>
                        <div class="text-2xl font-black text-red-600">${Number(ilan.fiyat).toLocaleString('tr-TR')} TL</div>
                        <div class="bg-gray-50 p-3 rounded-xl text-xs space-y-2">
                            <div><strong>Konum:</strong> ${ilan.il} / ${ilan.ilce} / ${ilan.mahalle}</div>
                            ${ilan.yil ? `<div><strong>Yıl / KM:</strong> ${ilan.yil} / ${ilan.km} KM</div>` : ''}
                            ${ilan.hasarDurumu ? `<div><strong>Hasar:</strong> ${ilan.hasarDurumu}</div>` : ''}
                        </div>
                        <a href="https://api.whatsapp.com/send?text=${wpMetin}" target="_blank" class="w-full bg-green-500 text-white text-xs font-bold py-3 rounded-xl block text-center">💬 WhatsApp ile Paylaş</a>
                        <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(ilan.il+'+'+ilan.ilce+'+'+ilan.mahalle)}" target="_blank" class="w-full bg-blue-600 text-white text-xs font-bold py-3 rounded-xl block text-center">🗺️ Konumu Haritada Bul</a>
                        <a href="tel:${ilan.tel}" class="w-full bg-gray-900 text-white text-xs font-bold py-3 rounded-xl block text-center">📞 Ara: ${ilan.tel}</a>
                    </div>
                </div>
            `;
        };

        const formKategoriDoldur = () => {
            const ana = document.getElementById('formAnaKategori').value;
            const alt = document.getElementById('formAltKategori');
            const mm = document.getElementById('formMarkaModel');
            alt.innerHTML = ''; mm.innerHTML = '';

            if(ana === 'Emlak') {
                document.getElementById('formEkspertizSemasiAlani').classList.add('hidden');
                alt.innerHTML = `<option value="Konut">Konut</option><option value="İş Yeri">İş Yeri</option>`;
            } else {
                document.getElementById('formEkspertizSemasiAlani').classList.remove('hidden');
                Object.keys(vasitaAgaci).forEach(k => alt.innerHTML += `<option value="${k}">${k}</option>`);
                formMarkaModelGuncelle();
            }
        };

        const formMarkaModelGuncelle = () => {
            const alt = document.getElementById('formAltKategori').value;
            const mm = document.getElementById('formMarkaModel');
            mm.innerHTML = '';
            if(vasitaAgaci[alt]) {
                Object.keys(vasitaAgaci[alt]).forEach(m => {
                    vasitaAgaci[alt][m].forEach(mod => {
                        mm.innerHTML += `<option value="${m}|${mod}">${m} ${mod}</option>`;
                    });
                });
            }
        };

        document.getElementById('emlakForm').onsubmit = async (e) => {
            e.preventDefault();
            let marka = "", model = "";
            if(document.getElementById('formAnaKategori').value === 'Vasıta' && document.getElementById('formMarkaModel').value) {
                marka = document.getElementById('formMarkaModel').value.split('|')[0];
                model = document.getElementById('formMarkaModel').value.split('|')[1];
            }

            const veri = {
                anaKategori: document.getElementById('formAnaKategori').value,
                baslik: document.getElementById('ilanBaslik').value,
                fiyat: document.getElementById('ilanFiyat').value,
                aciklama: document.getElementById('ilanAciklama').value,
                yil: document.getElementById('ilanYil').value,
                km: document.getElementById('ilanKm').value,
                hasarDurumu: document.getElementById('ilanHasarDurumu').value,
                il: document.getElementById('ilanIl').value,
                ilce: document.getElementById('ilanIlce').value,
                mahalle: document.getElementById('ilanMahalle').value,
                tel: document.getElementById('ilanTelefon').value,
                marka: marka, model: model,
                ekspertizVerisi: document.getElementById('formAnaKategori').value === 'Vasıta' ? ekspertizDurumu : null,
                gorseller: [],
                tarih: new Date().toISOString()
            };

            const files = document.getElementById('ilanDosyalar').files;
            if(files.length > 0) {
                const reader = new FileReader();
                reader.onloadend = async () => {
                    veri.gorseller.push(reader.result);
                    await addDoc(collection(db, "ilanlar"), veri);
                    alert("İlan Yayınlandı!");
                    ekranDegistir('ana');
                    ilanlariCek();
                };
                reader.readAsDataURL(files[0]);
            } else {
                await addDoc(collection(db, "ilanlar"), veri);
                alert("İlan Resimsiz Yayınlandı!");
                ekranDegistir('ana');
                ilanlariCek();
            }
        };

        const ilanlariCek = async () => {
            const s = await getDocs(query(collection(db, "ilanlar"), orderBy("tarih", "desc")));
            globalIlanlar = [];
            s.forEach(doc => globalIlanlar.push({id: doc.id, ...doc.data()}));
            ilanlariFiltrele();
        };

        // Buton Eşleşmeleri Ve Başlatıcılar
        document.getElementById('yeniIlanEkleLink').onclick = () => ekranDegistir('form');
        document.getElementById('logoBtn').onclick = () => { aktifKategori="Tümü"; ilanlariFiltrele(); ekranDegistir('ana'); };
        document.getElementById('detaydanGeriDonBtn').onclick = () => ekranDegistir('ana');
        document.getElementById('kilitliAlanGirisBtn').onclick = googleIleGirisYap;
        document.getElementById('formAnaKategori').onchange = formKategoriDoldur;
        document.getElementById('formAltKategori').onchange = formMarkaModelGuncelle;
        document.getElementById('filtreleriUygulaBtn').onclick = ilanlariFiltrele;
        document.getElementById('hizliAraBtn').onclick = ilanlariFiltrele;

        auth.onAuthStateChanged(user => {
            oturumGuncelle(user);
            kategorileriBas();
            ekspertizSemaCiz();
            formKategoriDoldur();
            ilanlariCek();
        });
    </script>
</body>
</html>
